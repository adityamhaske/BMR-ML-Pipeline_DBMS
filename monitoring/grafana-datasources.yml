apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
      exemplarTraceIdDestinations: []

  - name: PostgreSQL-Vectors
    type: postgres
    access: proxy
    url: postgres-vectors:5432
    database: bmr_vectors
    user: bmr
    secureJsonData:
      password: bmr_password
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 2
    editable: true

name: CD — Deploy to Production (Blue/Green ECS)

on:
  workflow_run:
    workflows: ["CI — Lint, Type Check, Test, Build"]
    branches: [main]
    types: [completed]

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: bmr-ml-pipeline-production
  ECS_SERVICE: bmr-serving-production
  CONTAINER_NAME: bmr-serving
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/serving

jobs:
  # Gate: only run if CI passed
  gate:
    name: CI Gate Check
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - run: echo "CI passed — proceeding to production deploy"

  # ─── Deploy to Production (Blue/Green) ─────────────────────────────────────
  deploy-production:
    name: Deploy Production (Blue/Green)
    runs-on: ubuntu-latest
    needs: gate
    environment:
      name: production
      url: https://api.bmr-ml.internal
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get image URI
        id: image
        run: |
          SHA=${{ github.event.workflow_run.head_sha }}
          echo "uri=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_SERVICE }} \
            --query taskDefinition \
            > task-def.json

      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.image.outputs.uri }}

      - name: Deploy to ECS (Blue/Green via CodeDeploy)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          deployment-controller: CODE_DEPLOY
          codedeploy-appspec: infra/codedeploy/appspec.yaml
          codedeploy-application: bmr-ml-serving
          codedeploy-deployment-group: bmr-ml-serving-production
          wait-for-service-stability: true

      - name: Promote MLflow model to Production
        run: |
          pip install mlflow -q
          python mlops/registry.py promote \
            --model-name bmr-customer-segmentation \
            --from-stage Staging \
            --to-stage Production
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}

      - name: Post-deploy smoke test
        run: |
          sleep 30  # Wait for traffic shift
          curl -sf ${{ secrets.PRODUCTION_API_URL }}/health
          curl -sf -X POST ${{ secrets.PRODUCTION_API_URL }}/v1/segment/predict \
            -H "Content-Type: application/json" \
            -d '{"record_id": "canary-001", "text": "Test deployment verification"}'
          echo "Production smoke test passed!"

      - name: Notify on success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: "✅ Production deploy succeeded | image=${{ steps.image.outputs.uri }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify on failure (auto-rollback triggered by CodeDeploy)
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: "❌ Production deploy FAILED — CodeDeploy auto-rollback triggered"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

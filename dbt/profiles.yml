bmr_ml_pipeline:
  target: local
  outputs:
    local:
      type: duckdb
      path: "{{ env_var('DUCKDB_PATH', 'data/local/warehouse.duckdb') }}"
      threads: 4
    staging:
      type: redshift
      host: "{{ env_var('REDSHIFT_HOST') }}"
      port: "{{ env_var('REDSHIFT_PORT', '5439') | int }}"
      dbname: "{{ env_var('REDSHIFT_DB') }}"
      user: "{{ env_var('REDSHIFT_USER') }}"
      password: "{{ env_var('REDSHIFT_PASSWORD') }}"
      schema: public
      threads: 4
      connect_timeout: 30
    production:
      type: redshift
      host: "{{ env_var('REDSHIFT_HOST') }}"
      port: "{{ env_var('REDSHIFT_PORT', '5439') | int }}"
      dbname: "{{ env_var('REDSHIFT_DB') }}"
      user: "{{ env_var('REDSHIFT_USER') }}"
      password: "{{ env_var('REDSHIFT_PASSWORD') }}"
      schema: public
      threads: 8
      connect_timeout: 30

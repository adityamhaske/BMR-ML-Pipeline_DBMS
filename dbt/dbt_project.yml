-- =============================================================================
-- dbt Project Config
-- =============================================================================
name: 'bmr_ml_pipeline'
version: '1.0.0'
config-version: 2

profile: 'bmr_ml_pipeline'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  bmr_ml_pipeline:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: table
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts

vars:
  start_date: '2023-01-01'
  environment: "{{ env_var('ENVIRONMENT', 'local') }}"
